name: Deploy to DirectAdmin
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 🛠 Generate Production Config
        run: |
          cat > includes/config.php << 'PHPEOF'
          <?php

          include_once('fix_mysql.php');

          ini_set('display_errors', 1);
          ini_set('display_startup_errors', 1);
          error_reporting(E_ALL & ~E_DEPRECATED & ~E_NOTICE & ~E_WARNING);

          if (get_magic_quotes_gpc()) {
              $process = array(&$_GET, &$_POST, &$_COOKIE, &$_REQUEST);
              while (list($key, $val) = each($process)) {
                  foreach ($val as $k => $v) {
                      unset($process[$key][$k]);
                      if (is_array($v)) {
                          $process[$key][stripslashes($k)] = $v;
                          $process[] = &$process[$key][stripslashes($k)];
                      } else {
                          $process[$key][stripslashes($k)] = stripslashes($v);
                      }
                  }
              }
              unset($process);
          }

          $_CFG = array(
              'version'        => '3.0.8',
              'mysqlServer'    => 'localhost',
              'mysqlUser'      => '${{ secrets.MYSQL_USER }}',
              'mysqlPass'      => '${{ secrets.MYSQL_PASS }}',
              'mysqlDB'        => '${{ secrets.MYSQL_DB }}',
              'siteURL'        => 'http://zgaprebi.ge/',
              'siteName'       => 'zgaprebi.ge',
              'subDir'         => '',
              'rootAddress'    => 'http://zgaprebi.ge',
              'adminDir'       => 'admin/',
              'display_errors' => array('92.51.101.242'),
              'contactEmail'   => 'enji777@gmail.com',
              'adminEmail'     => 'support@zgaprebi.ge',
              'GETs'           => array('l', 'p', 'sp'),
              'availLangs'     => array('ka' => 'ქართული'),
              'adminlang'      => 'ka',
              'allow_ips'      => array('82.211.155.53','176.73.185.73','149.3.31.211','92.51.101.242','46.49.0.102','185.26.182.30','46.49.51.216','78.133.192.36'),
              'gold_rate'      => 1,
              'cash_rate'      => 0.1,
          );

          $_CFG['smtp']['host'] = 'mail.zgaprebi.ge';
          $_CFG['smtp']['mail'] = 'noreply@zgaprebi.ge';
          $_CFG['smtp']['pass'] = '${{ secrets.SMTP_PASS }}';

          $_CFG['roles']['dashboard'] = 'Dashboard';
          $_CFG['roles']['modules']   = 'მოდულები';
          $_CFG['roles']['structure'] = 'სტრუქტურა';
          $_CFG['roles']['texts']     = 'ტექსტები';
          $_CFG['roles']['others']    = 'სხვადასხვა';

          define('FILE_SECURITY_KEY', '${{ secrets.FILE_SECURITY_KEY }}');
          define('RECAPTCHA_SECRET', '${{ secrets.RECAPTCHA_SECRET }}');

          if (in_array($_SERVER['REMOTE_ADDR'], $_CFG['display_errors'])) error_reporting(-1);
          ini_set("display_errors", (in_array($_SERVER['REMOTE_ADDR'], $_CFG['display_errors'])));
          PHPEOF

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}/
